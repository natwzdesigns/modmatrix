(function(){if(!window.matchMedia('(hover:hover)').matches)return;const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');if(!dot||!ring)return;let mx=0,my=0,rx=0,ry=0;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});const lerp=(a,b,t)=>a+(b-a)*t;(function loop(){rx=lerp(rx,mx,.12);ry=lerp(ry,my,.12);ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();})();

const PL={java:'<img src="../assets/java.png" style="width:12px;height:12px;object-fit:contain;vertical-align:middle;margin-right:3px;"/> Java',bedrock:'<img src="../assets/bedrock.png" style="width:12px;height:12px;object-fit:contain;vertical-align:middle;margin-right:3px;"/> Bedrock',mcpe:'<img src="../assets/mcpe.png" style="width:12px;height:12px;object-fit:contain;vertical-align:middle;margin-right:3px;"/> MCPE'};
const PC={java:'plat-java',bedrock:'plat-bedrock',mcpe:'plat-mcpe'};
const SL={active:'Active',discontinued:'Discontinued',beta:'Beta'};
const SC={active:'status-active',discontinued:'status-discontinued',beta:'status-beta'};
const LC={Latest:'lbl-latest',Stable:'lbl-stable',Legacy:'lbl-legacy',Beta:'lbl-beta'};

const slug=location.pathname.split('/').pop().replace('.html','');
const c=(typeof CLIENTS!=='undefined')?CLIENTS.find(x=>x.id===slug):null;
const root=document.getElementById('page-root');

if(!c){
  root.innerHTML='<p style="text-align:center;padding:140px 20px;color:var(--muted)">Client not found. <a href="../clients.html" style="color:var(--red2)">← Go back</a></p>';
}else{
  document.title='Mod Matrix — '+c.name;
  const ph=c.platforms.map(p=>`<span class="plat ${PC[p]}">${PL[p]}</span>`).join('');
  const th=(c.tags||[]).map(t=>`<span class="ch-tag">${t}</span>`).join('');
  const fh=(c.features||[]).map(f=>`<div class="feat-item reveal"><span class="feat-check">✦</span><span class="feat-text">${f}</span></div>`).join('');
  const vh=(c.versions||[]).map((v,i)=>`
    <div class="ver-card ${i===0?'latest':''} reveal" style="transition-delay:${i*.06}s">
      <span class="ver-num">${v.ver}</span>
      <span class="ver-lbl ${LC[v.label]||'lbl-legacy'}">${v.label}</span>
      <span class="ver-date">${v.date}</span>
      <span class="ver-notes">${v.notes||''}</span>
      <a class="ver-dl ${i===0?'dl-main':'dl-old'}" href="${v.dlUrl}" target="_blank">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        ${i===0?'Download Latest':'Download'}
      </a>
    </div>`).join('');

  root.innerHTML=`
    <div class="ch-wrap">
      <div class="ch-left">
        <a class="ch-back" href="../clients.html">← All Clients</a>
        <div class="ch-tags">${th}</div>
        <div class="ch-name">${c.name}</div>
        <div class="ch-plats">${ph}</div>
        <p class="ch-desc">${c.longDesc||c.desc}</p>
        <div class="ch-actions">
          <a class="btn btn-red" href="${(c.versions||[])[0]?.dlUrl||'#'}" target="_blank">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
            Download Latest
          </a>
          <a class="btn btn-ghost" href="https://youtube.com/c/ExoCubeYT" target="_blank">Watch Review</a>
        </div>
      </div>
      <div class="ch-right">
        <div class="ch-thumb-wrap">
          <span class="ch-status-badge status ${SC[c.status]}">${SL[c.status]}</span>
          <img class="ch-thumb" src="${c.thumbDetail||('../assets/borion.png')}" alt="${c.name}" onerror="this.style.opacity='.15'"/>
        </div>
      </div>
    </div>
    <div class="section-divider"></div>
    <div class="ch-features">
      <div class="sec-tag">// Features</div>
      <h2 class="sec-title">What's <span class="grad">included</span></h2>
      <div class="features-list">${fh}</div>
    </div>
    <div class="section-divider"></div>
    <div class="ch-versions">
      <div class="sec-tag">// Downloads</div>
      <h2 class="sec-title">All <span class="grad">Versions</span></h2>
      <p class="sec-sub" style="margin-bottom:0">Latest first. Older builds below for compatibility.</p>
      <div class="versions-list">${vh}</div>
    </div>
    <footer>
      <div class="footer-inner">
        <div class="footer-grid">
          <div class="footer-brand"><a class="logo" href="../index.html">MOD MATRIX</a><p>Free Minecraft client reviews for Java, Bedrock &amp; MCPE.</p></div>
          <div class="footer-col"><h4>Pages</h4><a href="../index.html">Home</a><a href="../clients.html">Clients</a><a href="../arsenal.html">Arsenal</a><a href="../about.html">About</a></div>
          <div class="footer-col"><h4>Links</h4><a href="https://youtube.com/c/ExoCubeYT" target="_blank">YouTube</a><a href="https://discord.gg/MXvYhg8Bdr" target="_blank">Discord</a><a href="https://github.com/ExoCubeYT" target="_blank">GitHub</a></div>
          <div class="footer-col"><h4>Legal</h4><a href="../terms.html">Terms of Use</a><a href="../privacy.html">Privacy Policy</a><a href="../disclaimer.html">Disclaimer</a></div>
        </div>
        <div class="footer-bottom">
          <p>© 2026 Mod Matrix by ExoCubeYT. Not affiliated with Mojang Studios.</p>
          <div class="footer-socials"><a class="footer-social" href="https://youtube.com/c/ExoCubeYT" target="_blank"><img src="../assets/youtube.png" alt="YouTube" style="width:16px;height:16px;object-fit:contain;"/></a><a class="footer-social" href="https://discord.gg/MXvYhg8Bdr" target="_blank"><img src="../assets/discord.png" alt="Discord" style="width:16px;height:16px;object-fit:contain;"/></a></div>
        </div>
      </div>
    </footer>`;

  const io=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:.08});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

/* disable right click */
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i'||e.key==='J'||e.key==='j'))||(e.ctrlKey&&(e.key==='u'||e.key==='U'))||(e.ctrlKey&&(e.key==='s'||e.key==='S'))){e.preventDefault();return false;}});

document.querySelectorAll('[data-glitch]').forEach(el=>{el.dataset.text=el.textContent;el.addEventListener('mouseenter',function(){const orig=el.dataset.text,ch='@#$%!&?*<>[]|';let f=0;(function s(){if(f>14){el.textContent=orig;return;}el.textContent=orig.split('').map((c,i)=>i<f/1.8?c:(c===' '?' ':ch[Math.floor(Math.random()*ch.length)])).join('');f++;requestAnimationFrame(s);})();});});
</script>
</body>
</html>
