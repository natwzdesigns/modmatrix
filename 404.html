<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — Lost? | Mod Matrix</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/x-icon" href="assets/haha.ico"/>
  <link rel="shortcut icon" href="assets/haha.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --red:#cc0000;--red2:#ff1a1a;--red-border:rgba(204,0,0,0.25);
      --glass:rgba(255,255,255,0.045);--glass2:rgba(255,255,255,0.08);
      --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
      --text:#f0e0e0;--muted:rgba(220,180,180,0.52);--bg:#0a0000;
    }

    html,body{height:100%;overflow:hidden;}

    body{
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:var(--bg);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;
      padding:24px;
      position:relative;
      cursor:none;
    }

    /* cursor */
    #cur-dot,#cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;display:none;}
    @media(hover:hover){#cur-dot,#cur-ring{display:block;}}
    #cur-dot{width:6px;height:6px;background:var(--red2);transform:translate(-50%,-50%);box-shadow:0 0 8px var(--red2);}
    #cur-ring{width:30px;height:30px;border:1.5px solid rgba(204,0,0,0.5);transform:translate(-50%,-50%);transition:width .18s,height .18s;}

    /* particles */
    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .bg-grad{position:fixed;inset:0;z-index:1;pointer-events:none;
      background:radial-gradient(ellipse 70% 60% at 20% 20%,rgba(160,0,0,0.2) 0%,transparent 65%),
                radial-gradient(ellipse 60% 50% at 80% 80%,rgba(100,0,0,0.12) 0%,transparent 65%);}
    .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
    .o1{width:600px;height:600px;background:radial-gradient(circle,rgba(160,0,0,0.16),transparent 70%);top:-240px;left:-200px;animation:od1 20s ease-in-out infinite alternate;}
    .o2{width:500px;height:500px;background:radial-gradient(circle,rgba(120,0,0,0.1),transparent 70%);bottom:-150px;right:-150px;animation:od2 24s ease-in-out infinite alternate;}
    @keyframes od1{to{transform:translate(60px,40px);}}
    @keyframes od2{to{transform:translate(-50px,-40px);}}

    /* noise */
    .noise{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.02;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:160px;}

    /* main card */
    .card{
      position:relative;z-index:10;
      background:rgba(255,255,255,0.045);
      border:1px solid var(--red-border);
      backdrop-filter:blur(24px);
      border-radius:20px;
      padding:clamp(28px,5vw,52px) clamp(24px,6vw,64px);
      max-width:620px; width:100%;
      animation:cardIn .7s cubic-bezier(.2,.8,.3,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}

    /* glitchy 404 */
    .four04{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(5rem,20vw,9rem);
      font-weight:900;
      line-height:1;
      background:linear-gradient(135deg,#fff 0%,#ffaaaa 40%,var(--red2) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 0 30px rgba(200,0,0,0.35));
      position:relative;
      animation:glitchNum 4s ease-in-out infinite;
      display:inline-block;
      margin-bottom:4px;
    }
    @keyframes glitchNum{
      0%,90%,100%{transform:translate(0);}
      91%{transform:translate(-3px,1px);filter:drop-shadow(3px 0 0 rgba(255,0,0,.5)) drop-shadow(-3px 0 0 rgba(0,200,255,.4));}
      93%{transform:translate(3px,-1px);}
      95%{transform:translate(-2px,2px);}
      97%{transform:translate(2px,-2px);filter:drop-shadow(0 0 30px rgba(200,0,0,0.35));}
    }

    .subtitle{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(.85rem,2.5vw,1.1rem);
      font-weight:700;letter-spacing:.08em;
      color:var(--muted);margin-bottom:28px;
    }

    /* roast box */
    .roast-wrap{
      background:rgba(200,0,0,0.07);
      border:1px solid rgba(200,0,0,0.2);
      border-radius:12px;
      padding:18px 20px;
      margin-bottom:24px;
      position:relative;
      min-height:72px;
      display:flex;align-items:center;justify-content:center;
    }
    .roast-text{
      font-size:clamp(.82rem,2vw,.95rem);
      line-height:1.65;
      color:var(--text);
      font-style:italic;
      transition:opacity .3s;
    }
    .roast-text.fade{opacity:0;}

    /* reroll button */
    .reroll-btn{
      background:none;border:1px solid var(--border2);
      border-radius:100px;padding:6px 16px;
      color:var(--muted);font-family:'Inter',sans-serif;font-size:.72rem;
      font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      cursor:pointer;transition:all .2s;margin-bottom:28px;
      display:inline-flex;align-items:center;gap:6px;
    }
    .reroll-btn:hover{color:var(--text);border-color:var(--red-border);background:var(--glass);}

    /* buttons */
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
    .btn{
      display:inline-flex;align-items:center;gap:7px;
      padding:11px 26px;border-radius:10px;
      font-family:'Inter',sans-serif;font-size:.84rem;font-weight:600;
      letter-spacing:.04em;text-decoration:none;cursor:pointer;border:none;
      transition:transform .15s,box-shadow .15s;white-space:nowrap;
    }
    .btn:hover{transform:translateY(-2px);}
    .btn-red{background:linear-gradient(135deg,var(--red),#880000);color:#fff;box-shadow:0 4px 20px rgba(180,0,0,.4);}
    .btn-red:hover{box-shadow:0 6px 28px rgba(200,0,0,.55);}
    .btn-ghost{background:var(--glass);border:1px solid var(--border2);color:var(--text);}
    .btn-ghost:hover{background:var(--glass2);}

    /* music player */
    .music-bar{
      display:flex;align-items:center;gap:10px;
      background:var(--glass);border:1px solid var(--border);
      border-radius:100px;padding:8px 16px;
      font-size:.75rem;color:var(--muted);
      cursor:pointer;transition:border-color .2s,background .2s;
      justify-content:center;
    }
    .music-bar:hover{border-color:var(--red-border);background:var(--glass2);}
    .music-icon{font-size:1rem;animation:spin 3s linear infinite paused;}
    .music-icon.playing{animation-play-state:running;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .music-label{font-weight:600;color:var(--text);}
    .music-wave{display:flex;gap:2px;align-items:flex-end;height:14px;}
    .music-wave span{width:3px;background:var(--red2);border-radius:2px;animation:wave 1s ease-in-out infinite;animation-play-state:paused;}
    .music-wave.playing span{animation-play-state:running;}
    .music-wave span:nth-child(1){height:4px;animation-delay:0s;}
    .music-wave span:nth-child(2){height:10px;animation-delay:.15s;}
    .music-wave span:nth-child(3){height:6px;animation-delay:.3s;}
    .music-wave span:nth-child(4){height:12px;animation-delay:.1s;}
    .music-wave span:nth-child(5){height:5px;animation-delay:.25s;}
    @keyframes wave{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.8);}}

    /* nav minimal */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:500;
      height:60px;display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;
      background:rgba(10,0,0,0.6);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--red-border);
    }
    .logo{
      font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:.1em;
      background:linear-gradient(90deg,#fff 20%,var(--red2) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-decoration:none;
    }
    .nav-home{
      color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:500;
      padding:7px 14px;border-radius:8px;border:1px solid var(--border);
      transition:all .2s;
    }
    .nav-home:hover{color:var(--text);border-color:var(--red-border);}

    @media(max-width:480px){
      .btn-row{flex-direction:column;align-items:stretch;}
      .btn{justify-content:center;}
    }
  </style>
</head>
<body>
<div class="noise"></div>
<div class="orb o1"></div><div class="orb o2"></div>
<canvas id="bg-canvas"></canvas>
<div class="bg-grad"></div>
<div id="cur-dot"></div><div id="cur-ring"></div>

<nav>
  <a class="logo" href="index.html">MOD MATRIX</a>
  <a class="nav-home" href="index.html">← Back to Home</a>
</nav>

<div class="card">
  <div class="four04">404</div>
  <div class="subtitle">Page Not Found</div>

  <div class="roast-wrap">
    <p class="roast-text" id="roast">Loading roast...</p>
  </div>

  <button class="reroll-btn" id="reroll-btn" onclick="newRoast()">
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    Another one
  </button>

  <div class="btn-row">
    <a href="index.html" class="btn btn-red">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Take Me Home
    </a>
    <a href="clients.html" class="btn btn-ghost">Browse Clients</a>
  </div>

  <div class="music-bar" id="music-bar" onclick="toggleMusic()">
    <span class="music-icon" id="music-icon">🎵</span>
    <span class="music-label" id="music-label">Play vibe music</span>
    <div class="music-wave" id="music-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
</div>

<audio id="bg-music" loop>
  <source src="assets/music.mp3" type="audio/mpeg"/>
</audio>

<script>
/* cursor */
(function(){
  if(!window.matchMedia('(hover:hover)').matches)return;
  var dot=document.getElementById('cur-dot'),ring=document.getElementById('cur-ring');
  var mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
  (function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop);})();
})();

/* particles */
(function(){
  var canvas=document.getElementById('bg-canvas');
  var ctx=canvas.getContext('2d');
  var W,H,pts=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function P(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;this.r=Math.random()*1.2+.3;this.a=Math.random()*.3+.06;}
  P.prototype.step=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H){this.x=Math.random()*W;this.y=Math.random()*H;}};
  P.prototype.draw=function(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba(200,0,0,'+this.a+')';ctx.fill();};
  for(var i=0;i<80;i++)pts.push(new P());
  (function tick(){ctx.clearRect(0,0,W,H);pts.forEach(function(p){p.step();p.draw();});requestAnimationFrame(tick);})();
})();

/* right click disable */
document.addEventListener('contextmenu',function(e){e.preventDefault();});
document.addEventListener('keydown',function(e){
  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i'||e.key==='J'||e.key==='j'))||(e.ctrlKey&&(e.key==='u'||e.key==='U'))||(e.ctrlKey&&(e.key==='s'||e.key==='S'))){
    e.preventDefault();return false;
  }
});

/* ROASTS */
var roasts = [
  "Bro typed a URL like he was throwing darts blindfolded. Not a single hit. 🎯",
  "Even Google couldn't find what you were looking for. And Google finds EVERYTHING.",
  "You navigated to the shadow realm. There's nothing here but your mistakes.",
  "This page doesn't exist. Kind of like your sense of direction.",
  "404 is just a fancy way of saying you're lost AND embarrassing yourself publicly.",
  "The URL you typed has never existed. Not yesterday. Not today. Not ever. Respect the delusion though.",
  "You fumbled harder than a Bedrock player trying to reach Diamond in Java.",
  "Bro called the wrong address and is STILL standing outside waiting. 🚪",
  "This is the digital equivalent of walking into the wrong class and sitting down anyway.",
  "Not even the server knows what you were looking for. That's impressive failure.",
  "You typed that URL with full confidence too. We saw it. We judged you.",
  "The page you wanted ghosted you before you even got a reply.",
  "Somewhere a 404 page is looking at YOU with pity.",
  "Even a ghost client with no modules is more functional than your navigation skills.",
  "You wandered off the internet and into the void. The void says hi btw.",
  "This URL is as real as free Minecoins. It was never going to work out.",
  "You searched for something that doesn't exist. That's just a Tuesday for some people.",
  "Certified lost person moment. The map was literally right there.",
  "Your GPS said 'turn left', you went right, and now you're here. In the void.",
  "This page went missing before you even got here. It knew you were coming.",
];

var lastIdx = -1;
function newRoast(){
  var el = document.getElementById('roast');
  el.classList.add('fade');
  setTimeout(function(){
    var idx;
    do { idx = Math.floor(Math.random()*roasts.length); } while(idx===lastIdx);
    lastIdx = idx;
    el.textContent = '"' + roasts[idx] + '"';
    el.classList.remove('fade');
  }, 300);
}
newRoast();

/* MUSIC */
var audio = document.getElementById('bg-music');
var playing = false;

function toggleMusic(){
  var icon  = document.getElementById('music-icon');
  var label = document.getElementById('music-label');
  var wave  = document.getElementById('music-wave');

  if(playing){
    audio.pause();
    playing = false;
    icon.classList.remove('playing');
    wave.classList.remove('playing');
    label.textContent = 'Play vibe music';
    icon.textContent = '🎵';
  } else {
    audio.play().then(function(){
      playing = true;
      icon.classList.add('playing');
      wave.classList.add('playing');
      label.textContent = 'Now playing...';
      icon.textContent = '🎶';
    }).catch(function(){
      label.textContent = 'Click again to play';
    });
  }
}

/* auto-play on first interaction */
document.addEventListener('click', function autoPlay(){
  if(!playing){ toggleMusic(); }
  document.removeEventListener('click', autoPlay);
}, {once:true});
</script>
</body>
</html>
